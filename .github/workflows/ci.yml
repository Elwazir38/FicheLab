name: CI

# Lance la suite de tests à chaque push et chaque pull request.
# Les tests Pyromaths sont volontairement « sans compilation LaTeX » :
# aucune chaîne TeX n'est nécessaire ici, juste Python + pytest.

on:
  push:
    branches: [master, main]
  pull_request:

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]

    steps:
      - uses: actions/checkout@v4

      - name: Installer Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Installer les dépendances (prod + dev)
        run: python -m pip install --upgrade pip && python -m pip install -r requirements-dev.txt

      - name: Lancer les tests
        run: python -m pytest backend/tests -q
